services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: org_user
      POSTGRES_PASSWORD: org_pass
      POSTGRES_DB: org_structure
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://org_user:org_pass@db:5432/org_structure
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  test_db:
    image: postgres:16
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    volumes:
      - test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  tests:
    build: .
    depends_on:
      test_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@test_db:5432/test_db
      TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_pass@test_db:5432/test_db
    command: >
      sh -c "alembic upgrade head && pytest -v"
    restart: "no"
volumes:
  pgdata:
  test_pgdata: